name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: leftover-savior/package-lock.json

      - name: Install dependencies
        working-directory: leftover-savior
        run: npm ci

      - name: Build
        working-directory: leftover-savior
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || '' }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: leftover-savior/dist
          publish_branch: gh-pages
